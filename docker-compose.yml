services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      SHEMA: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: my_database
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:secret_password@db:5432/my_database}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_database"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # PGAdmin Panel
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5050:80"
    depends_on:
      - db
  # Backend (Node.js)
  backend:
    build: ./backend
    container_name: node_backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: .
    volumes:
      - ./backend:/app # maps local code to the container
      - /app/node_modules # this will keep modules inside the container
    restart: always
    ports:
      - "${NODE_PORT}:5000"
    env_file:
      - ./backend/.env
    environment:
      - SCHEMA=app
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:secret_password@db:5432/my_database}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
    command: >
      sh -c "
        ./wait-for-test-db.sh &&
        npm run dev
      "
    #  sh -c "npm run migrate:up --schema app && npm run dev"
  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: .
    ports:
      - "${REACT_PORT}:3000"
    stdin_open: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules

volumes:
  pgdata:
