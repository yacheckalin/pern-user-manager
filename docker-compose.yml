services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: my_database
      DATABASE_URL: postgres://postgres:secret_password@db:5432/my_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_database"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # PGAdmin Panel
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
  # Backend (Node.js)
  backend:
    build: ./backend
    container_name: node_backend
    volumes:
      - ./backend:/app # maps local code to the container
      - /app/node_modules # this will keep modules inside the container
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
    depends_on:
      - db
  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "3000:3000"
    stdin_open: true
    depends_on:
      - backend

volumes:
  pgdata:
